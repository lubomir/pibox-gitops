---
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: forgejo-runner
  namespace: forgejo
  labels:
    app: forgejo-runner
spec:
  jobTargetRef:
    activeDeadlineSeconds: 3600
    backoffLimit: 0
    template:
      metadata:
        labels:
          app: forgejo-runner
      spec:
        restartPolicy: Never
        shareProcessNamespace: true
        containers:
          - name: runner
            image: code.forgejo.org/forgejo/runner:12.7.1
            resources:
              requests:
                cpu: 20m
                memory: 128Mi
              limits:
                memory: 512Mi
            command:
              - sh
              - -c
              - |
                while ! nc -z localhost 2376 </dev/null; do
                  echo 'waiting for docker daemon...'
                  sleep 5
                done
                cp /secret/RUNNER_CONFIG /data/.runner
                forgejo-runner -c /config/config.yaml one-job
                rc=$?
                # Kill dockerd so the pod can terminate
                pkill -f dockerd || true
                exit $rc
            env:
              - name: DOCKER_HOST
                value: tcp://localhost:2376
              - name: DOCKER_CERT_PATH
                value: /certs/client
              - name: DOCKER_TLS_VERIFY
                value: "1"
            volumeMounts:
              - name: runner-data
                mountPath: /data
              - name: runner-config
                mountPath: /config
                readOnly: true
              - name: runner-secret
                mountPath: /secret
                readOnly: true
              - name: docker-certs
                mountPath: /certs
              - name: cache-data
                mountPath: /data/.cache
          - name: dind
            image: docker:29-dind@sha256:1ba18449911d01f477a3fc104123c85d677addc60701b14b3fcb5381f9c4a537
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 20m
                memory: 128Mi
              limits:
                memory: 1Gi
            command:
              - dockerd-entrypoint.sh
            env:
              - name: DOCKER_TLS_CERTDIR
                value: /certs
            volumeMounts:
              - name: docker-storage
                mountPath: /var/lib/docker
              - name: docker-certs
                mountPath: /certs
        volumes:
          - name: runner-data
            emptyDir: {}
          - name: runner-config
            configMap:
              name: forgejo-runner-config
          - name: runner-secret
            secret:
              secretName: forgejo-runner-secret
          - name: cache-data
            persistentVolumeClaim:
              claimName: forgejo-runner-cache
          - name: docker-storage
            emptyDir: {}
          - name: docker-certs
            emptyDir: {}
  pollingInterval: 30
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  minReplicaCount: 0
  maxReplicaCount: 1
  triggers:
    - type: forgejo-runner
      metadata:
        name: "k8s-runner-1"
        address: "http://forgejo-http.forgejo.svc.cluster.local"
        global: "true"
        labels: "docker"
      authenticationRef:
        name: forgejo-runner-keda-creds
