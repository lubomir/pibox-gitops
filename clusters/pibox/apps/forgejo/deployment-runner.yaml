---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:12.7.1
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              memory: 512Mi
          command:
            - /bin/sh
            - -c
          args:
            - |
              # Wait for Forgejo to be ready
              while ! wget -q --spider http://forgejo-http/api/healthz 2>/dev/null; do
                echo "Waiting for Forgejo to be ready..."
                sleep 5
              done

              # Register runner if not already registered
              if [ ! -f /data/.runner ]; then
                forgejo-runner register \
                  --no-interactive \
                  --instance http://forgejo-http \
                  --token "${RUNNER_TOKEN}" \
                  --name "k8s-runner-1" \
                  --labels "docker:docker://${RUNNER_LABEL_IMAGE}"
              fi

              # Start the runner
              forgejo-runner daemon
          env:
            - name: RUNNER_LABEL_IMAGE
              value: "node:24-bookworm"
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  key: RUNNER_TOKEN
                  name: forgejo-runner-secret
            - name: DOCKER_HOST
              value: tcp://localhost:2376
            - name: DOCKER_CERT_PATH
              value: /certs/client
            - name: DOCKER_TLS_VERIFY
              value: "1"
          volumeMounts:
            - mountPath: /data
              name: runner-data
            - mountPath: /certs
              name: docker-certs
        - name: dind
          image: docker:29-dind@sha256:1ba18449911d01f477a3fc104123c85d677addc60701b14b3fcb5381f9c4a537
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              memory: 1Gi
          env:
            - name: DOCKER_TLS_CERTDIR
              value: /certs
          volumeMounts:
            - mountPath: /var/lib/docker
              name: runner-data
              subPath: docker
            - mountPath: /certs
              name: docker-certs
      volumes:
        - name: runner-data
          persistentVolumeClaim:
            claimName: forgejo-runner-data
        - name: docker-certs
          emptyDir: {}
