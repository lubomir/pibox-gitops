---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
  namespace: forgejo
data:
  config.yaml: |
    log:
      level: info
      job_level: info
    runner:
      file: /data/.runner
      capacity: 1
      envs:
        DOCKER_HOST: tcp://localhost:2376
        DOCKER_TLS_VERIFY: "1"
        DOCKER_CERT_PATH: /certs/client
      timeout: 3h
      shutdown_timeout: 0s
      insecure: false
      fetch_timeout: 5s
      fetch_interval: 2s
      report_interval: 1s
      labels:
        - "docker:docker://node:24-bookworm"
    cache:
      enabled: true
      dir: ""
      host: ""
      port: 0
      proxy_port: 0
      external_server: ""
      secret: ""
      actions_cache_url_override: ""
    container:
      network: ""
      enable_ipv6: false
      privileged: false
      options:
      workdir_parent:
      valid_volumes: []
      docker_host: "-"
      force_pull: false
      force_rebuild: false
    host:
      workdir_parent:
