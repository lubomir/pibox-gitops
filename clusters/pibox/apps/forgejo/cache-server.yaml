---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner-cache
  namespace: forgejo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: forgejo-runner-cache
  template:
    metadata:
      labels:
        app: forgejo-runner-cache
    spec:
      containers:
        - name: cache-server
          image: code.forgejo.org/forgejo/runner:12.7.1
          command:
            - forgejo-runner
            - cache-server
            - --dir
            - /data/cache
            - --port
            - "8080"
            - --secret
            - $(CACHE_SECRET)
          env:
            - name: CACHE_SECRET
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-secret
                  key: CACHE_SECRET
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: cache
              mountPath: /data
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: forgejo-runner-cache
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-runner-cache
  namespace: forgejo
spec:
  selector:
    app: forgejo-runner-cache
  ports:
    - port: 8080
      targetPort: 8080
