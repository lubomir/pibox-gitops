---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo
  namespace: argocd
spec:
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: forgejo-runner
      jsonPointers:
        - /spec/replicas
  project: default

  source:
    repoURL: https://github.com/lubomir/pibox-gitops.git
    targetRevision: main
    path: clusters/pibox/apps/forgejo

  destination:
    server: https://kubernetes.default.svc
    namespace: forgejo

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
