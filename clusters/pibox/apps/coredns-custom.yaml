---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coredns-custom
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/lubomir/pibox-gitops.git
    targetRevision: main
    path: clusters/pibox/apps/coredns-custom

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
